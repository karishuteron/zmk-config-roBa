name: Build ZMK for roBa

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [seeeduino_xiao_ble]
        shield: [roBa_L, roBa_R]

    steps:
      - name: Checkout config repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install west and dependencies
        run: |
          pip install west
          west init -l config
          west update
          west zephyr-export
          pip install -r zephyr/scripts/requirements.txt

      - name: Build firmware
        run: |
          for shield in ${{ matrix.shield }}; do
            west build -s app -b ${{ matrix.board }} -- -DSHIELD=$shield
            cp build/zephyr/zmk.uf2 ${{ matrix.board }}_${shield}.uf2
          done

      - name: Upload firmware
        uses: actions/upload-artifact@v3
        with:
          name: zmk-firmware
          path: "*.uf2"
