name: Build ZMK (roBa on XIAO BLE)

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shield: [roBa_L, roBa_R]

    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4

      - name: Workflow marker
        run: |
          echo "MARKER: custom-xiao-ble-workflow-v2"
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "GITHUB_REF=$GITHUB_REF"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install west

      - name: Show west manifest (as checked in)
        run: |
          echo "--- west.yml (repo root) ---"
          if [ -f west.yml ]; then sed -n '1,200p' west.yml; else echo "(none)"; fi
          echo "--- config/west.yml ---"
          if [ -f config/west.yml ]; then sed -n '1,200p' config/west.yml; else echo "(none)"; fi
          echo "--- config/config/west.yml ---"
          if [ -f config/config/west.yml ]; then sed -n '1,200p' config/config/west.yml; else echo "(none)"; fi

      - name: Prepare west workspace
        run: |
          rm -rf west-workspace
          mkdir -p west-workspace

      - name: West init (using this config repo)
        working-directory: west-workspace
        run: |
          west init -l ../config/config
          west topdir
          ls -la .west
          echo "--- manifest location ---"
          ls -la .west/manifest || true
          echo "--- local manifest (config/config/west.yml) ---"
          sed -n '1,200p' ../config/config/west.yml

      - name: West update (verbose)
        working-directory: west-workspace
        env:
          GIT_TERMINAL_PROMPT: "0"
        run: |
          west update -v

      - name: Resolve manifest (debug)
        working-directory: west-workspace
        run: |
          west -vv manifest --validate || true
          west -vv manifest --show-toplevel || true
          west manifest --resolve > ../resolved-manifest-${{ matrix.shield }}.yml
          echo "--- resolved-manifest.yml (head) ---"
          sed -n '1,120p' ../resolved-manifest-${{ matrix.shield }}.yml

      - name: Export Zephyr and install python requirements
        working-directory: west-workspace
        run: |
          west zephyr-export
          pip install -r zephyr/scripts/requirements.txt

      - name: Build firmware
        working-directory: west-workspace
        run: |
          west build -v -s zmk/app -b xiao_ble -- \
            -DZMK_CONFIG=${{ github.workspace }}/config \
            -DSHIELD=${{ matrix.shield }} \
            -DZMK_EXTRA_MODULES=${{ github.workspace }}

      - name: Copy artifacts
        run: |
          cp west-workspace/build/zephyr/zmk.uf2 xiao_ble_${{ matrix.shield }}.uf2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zmk-${{ matrix.shield }}-xiao_ble
          path: xiao_ble_${{ matrix.shield }}.uf2

      - name: Upload resolved manifest (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resolved-manifest-${{ matrix.shield }}
          path: resolved-manifest-${{ matrix.shield }}.yml