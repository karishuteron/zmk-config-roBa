# No file named `config/west.yml` or `west.yml` was provided for editing.  
# Please provide the content of the file `config/west.yml` or `west.yml` to apply the requested changes.
name: Build ZMK (roBa on XIAO BLE)

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shield: [roBa_L, roBa_R]

    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install west

      - name: Show west manifest (as checked in)
        run: |
          echo "--- config/west.yml ---"
          sed -n '1,200p' config/west.yml

      - name: West init (using this config repo)
        run: |
          west init -l config

      - name: Resolve manifest (debug)
        run: |
          west manifest --resolve > resolved-manifest.yml
          echo "--- resolved-manifest.yml (head) ---"
          sed -n '1,120p' resolved-manifest.yml

      - name: West update (verbose)
        env:
          GIT_TERMINAL_PROMPT: "0"
        run: |
          west update -v

      - name: Export Zephyr and install python requirements
        run: |
          west zephyr-export
          pip install -r zephyr/scripts/requirements.txt

      - name: Build firmware
        run: |
          west build -s zmk/app -b xiao_ble -- -DSHIELD=${{ matrix.shield }}

      - name: Copy artifacts
        run: |
          cp build/zephyr/zmk.uf2 xiao_ble_${{ matrix.shield }}.uf2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zmk-${{ matrix.shield }}-xiao_ble
          path: xiao_ble_${{ matrix.shield }}.uf2

      - name: Upload resolved manifest (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resolved-manifest
          path: resolved-manifest.yml